<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container contact-container">
        <!-- Navbar -->
        <div class="navbar">
            <div class="logo">
                <a href="index.html">CSS</a>
            </div>
            <ul>
                <li><a href="hakkimizda.html">Hakkımızda</a></li>
                <li><a href="hizmetler.html">Hizmetler</a></li>
                <li><a href="urunler.html">Ürünler</a></li>
                <li><a href="iletisim.html" class="active">İletişim</a></li>
            </ul>
        </div>

        <!-- Contact Section -->
        <div class="contact-section">
            <!-- Left Side - Social Media Icons -->
            <div class="contact-left">
                <div class="social-icons">
                    <a href="https://www.instagram.com/samiyesari?igsh=cDVseWE0dHhiN3Bk" class="social-icon instagram" title="Instagram">
                        <i class="fab fa-instagram"></i>
                    </a>
                    <a href="https://wa.me/905314247363" class="social-icon whatsapp" title="WhatsApp">
                        <i class="fab fa-whatsapp"></i>
                    </a>
                </div>
            </div>

            <!-- Right Side - Contact Form -->
            <div class="contact-right">
                <div class="contact-form-container">
                    <h2>İletişim Formü</h2>
                    <form class="contact-form">
                        <div class="form-group">
                            <input type="text" placeholder="Adınız" required>
                        </div>
                        <div class="form-group">
                            <input type="email" placeholder="E-Mail Adresiniz" required>
                        </div>
                        <div class="form-group">
                            <input type="tel" placeholder="Telefon Numaranız" required>
                        </div>
                        <div class="form-group">
                            <textarea placeholder="Mesajınız" rows="6" required></textarea>
                        </div>
                        <button type="submit" class="submit-btn">Gönder</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
